<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reel 2 Preview - "19 ans, 0 code"</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            overflow: hidden;
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 1080px;
            max-height: 1920px;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .overlay {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: 'Arial', 'Helvetica', sans-serif;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 0 0 2px rgba(0,0,0,0.5);
        }

        .subtitle {
            position: absolute;
            bottom: 15%; /* Above Instagram dead zone (bottom 12%) */
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            font-size: 24px;
            line-height: 1.4;
            color: white;
            font-family: 'Arial', 'Helvetica', sans-serif;
            font-weight: bold;
            text-shadow: 0 0 3px rgba(0,0,0,0.7);
            padding: 0 5%;
        }

        .hook-text {
            font-size: 36px;
            text-align: center;
            width: 80%;
            bottom: 60%;
        }

        .context-text {
            font-size: 28px;
            text-align: center;
            width: 85%;
            bottom: 40%;
        }

        .cta-text {
            font-size: 32px;
            text-align: center;
            width: 80%;
            bottom: 20%;
        }

        .agent-label {
            position: absolute;
            top: 10%;
            left: 10%;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 20px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .agent-label.visible {
            opacity: 1;
        }

        /* Dead zones visualization (for development only) */
        .dead-zones {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .dead-zone-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 12%;
            background: rgba(255,0,0,0.2);
        }

        .dead-zone-right {
            position: absolute;
            top: 0;
            right: 0;
            width: 12%;
            height: 100%;
            background: rgba(255,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="reel-video" autoplay muted playsinline>
            <source src="../../Enregistrement/2.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <!-- Subtitles container -->
        <div class="subtitle" id="subtitles">
            <!-- Subtitles will be populated by JavaScript -->
        </div>

        <!-- Overlay containers -->
        <div class="overlay hook-text" id="hook-overlay">
            J'ai 19 ans.<br>Je n'ai jamais appris à coder. Et pourtant, cet agent travaille pour moi tous les jours.
        </div>

        <div class="overlay context-text" id="context-overlay">
            <!-- Context phrases will appear here -->
        </div>

        <div class="overlay cta-text" id="cta-overlay">
            Commente AGENT et je te te le donne.
        </div>

        <!-- Agent label -->
        <div class="agent-label" id="agent-label">
            Agent TikTok IA
        </div>

        <!-- Dead zones visualization (remove in production) -->
        <div class="dead-zones">
            <div class="dead-zone-bottom"></div>
            <div class="dead-zone-right"></div>
        </div>
    </div>

    <!-- GSAP from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const video = document.getElementById('reel-video');
            const subtitlesDiv = document.getElementById('subtitles');
            const hookOverlay = document.getElementById('hook-overlay');
            const contextOverlay = document.getElementById('context-overlay');
            const ctaOverlay = document.getElementById('cta-overlay');
            const agentLabel = document.getElementById('agent-label');

            // Wait for video to load metadata
            video.addEventListener('loadedmetadata', function() {
                const videoDuration = video.duration;
                console.log(`Video duration: ${videoDuration} seconds`);

                // Define subtitle segments (approximate timing based on script)
                // In a real implementation, these would come from a transcript file
                const subtitleSegments = [
                    { start: 0.0, end: 3.0, text: "J'ai 19 ans. Je n'ai jamais appris à coder." },
                    { start: 3.0, end: 6.0, text: "Et pourtant, cet agent travaille pour moi" },
                    { start: 6.0, end: 9.0, text: "tous les jours." },
                    { start: 9.0, end: 12.0, text: "J'entends souvent 'ouais mais moi je" },
                    { start: 12.0, end: 15.0, text: "comprennait pas l'IA'. Moi non plus" },
                    { start: 15.0, end: 18.0, text: "au départ je ne comprennait pas." },
                    { start: 18.0, end: 21.0, text: "Ce que j'ai fait c'est configurer un" },
                    { start: 21.0, end: 24.0, text: "agent natif Claude une seule fois." },
                    { start: 24.0, end: videoDuration, text: "Et maintenant il génère mon contenu," }
                ];

                // Create subtitle elements
                subtitleSegments.forEach(segment => {
                    const subtitleEl = document.createElement('div');
                    subtitleEl.className = 'subtitle-line';
                    subtitleEl.textContent = segment.text;
                    subtitleEl.style.position = 'absolute';
                    subtitleEl.style.bottom = '15%';
                    subtitleEl.style.left = '50%';
                    subtitleEl.style.transform = 'translateX(-50%)';
                    subtitleEl.style.width = '90%';
                    subtitleEl.style.textAlign = 'center';
                    subtitleEl.style.fontSize = '24px';
                    subtitleEl.style.lineHeight = '1.4';
                    subtitleEl.style.color = 'white';
                    subtitleEl.style.fontFamily = "'Arial', 'Helvetica', sans-serif";
                    subtitleEl.style.fontWeight = 'bold';
                    subtitleEl.style.textShadow = '0 0 3px rgba(0,0,0,0.7)';
                    subtitleEl.style.padding = '0 5%';
                    subtitleEl.style.opacity = '0';
                    subtitlesDiv.appendChild(subtitleEl);

                    // Animate subtitle in/out
                    gsap.fromTo(subtitleEl,
                        { opacity: 0, y: 20 },
                        {
                            opacity: 1,
                            y: 0,
                            duration: 0.5,
                            startAt: { opacity: 0, y: 20 },
                            scrollTrigger: {
                                start: `top+=${segment.start}`,
                                end: `top+=${segment.end}`,
                                scrub: true,
                                anticipation: 1,
                                // Since we're not scrolling, we'll use time-based
                            }
                        }
                    );

                    // Simple time-based animation
                    gsap.to(subtitleEl, {
                        opacity: 1,
                        startTime: segment.start,
                        duration: 0.5
                    });

                    gsap.to(subtitleEl, {
                        opacity: 0,
                        startTime: segment.end,
                        duration: 0.5
                    });
                });

                // Hook overlay animation (0-3s)
                gsap.fromTo(hookOverlay,
                    { opacity: 0, y: -50 },
                    {
                        opacity: 1,
                        y: 0,
                        duration: 0.5,
                        delay: 0
                    }
                );

                gsap.to(hookOverlay, {
                    opacity: 0,
                    duration: 0.5,
                    startTime: 3.5
                });

                // Context overlay - show key phrases progressively
                const contextPhrases = [
                    { start: 3.0, end: 6.0, text: "Je comprends pas l'IA au départ" },
                    { start: 6.0, end: 9.0, text: "Configurer agent Claude une fois" },
                    { start: 9.0, end: 12.0, text: "Il génère mon contenu adapté" },
                    { start: 12.0, end: 15.0, text: "Sans tout réexpliquer chaque fois" }
                ];

                contextPhrases.forEach((phrase, index) => {
                    const phraseEl = document.createElement('div');
                    phraseEl.textContent = phrase.text;
                    phraseEl.style.position = 'absolute';
                    phraseEl.style.bottom = '40%';
                    phraseEl.style.left = '50%';
                    phraseEl.style.transform = 'translateX(-50%)';
                    phraseEl.style.width = '85%';
                    phraseEl.style.textAlign = 'center';
                    phraseEl.style.fontSize = '28px';
                    phraseEl.style.fontFamily = "'Arial', 'Helvetica', sans-serif";
                    phraseEl.style.fontWeight = 'bold';
                    phraseEl.style.color = 'white';
                    phraseEl.style.textShadow = '0 0 2px rgba(0,0,0,0.5)';
                    phraseEl.style.opacity = '0';
                    contextOverlay.appendChild(phraseEl);

                    gsap.fromTo(phraseEl,
                        { opacity: 0, y: 20 },
                        {
                            opacity: 1,
                            y: 0,
                            duration: 0.5
                        }
                    );

                    gsap.to(phraseEl, {
                        opacity: 0,
                        startTime: phrase.end,
                        duration: 0.5
                    });

                    gsap.to(phraseEl, {
                        opacity: 1,
                        startTime: phrase.start,
                        duration: 0.5
                    });
                });

                // Agent label - show during demo phase when screen is visible
                // Assuming demo starts around 3s and goes to end
                gsap.fromTo(agentLabel,
                    { opacity: 0 },
                    {
                        opacity: 0.8,
                        duration: 0.5,
                        delay: 3.0
                    }
                );

                gsap.to(agentLabel, {
                    opacity: 0,
                    duration: 0.5,
                    startTime: Math.min(15.0, videoDuration) // Hide before CTA if video is short
                });

                // CTA overlay (adjust timing for actual video length)
                const ctaStart = Math.min(18.0, videoDuration - 4); // Start 4 seconds before end
                const ctaEnd = videoDuration;

                gsap.fromTo(ctaOverlay,
                    { opacity: 0, y: 50 },
                    {
                        opacity: 1,
                        y: 0,
                        duration: 0.5,
                        delay: ctaStart
                    }
                );

                gsap.to(ctaOverlay, {
                    opacity: 0,
                    duration: 0.5,
                    startTime: ctaEnd - 0.5
                });

                // Add event listener to restart video when ended
                video.addEventListener('ended', function() {
                    video.currentTime = 0;
                    video.play();
                });
            });

            // Handle video loading errors
            video.addEventListener('error', function(e) {
                console.error('Video loading error:', e);
                document.body.innerHTML = '<div style="color: white; text-align: center; padding: 20px;">Error loading video. Please check the file path.</div>';
            });
        });
    </script>
</body>
</html>
